<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Live Call | Mohammed Ihsan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg: #0f1117;
      --panel: #161b22;
      --accent: #4f98a3;
      --accent-soft: #1a3a3e;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2332 0, #050712 50%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .call-shell {
      width: 100%;
      max-width: 1100px;
      background: rgba(10, 13, 23, 0.94);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7);
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .call-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(48, 54, 61, 0.7);
    }
    .call-title {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.35);
    }
    .pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px rgba(74, 222, 128, 0.7);
    }
    .role-select {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }
    .role-select label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(75, 85, 99, 0.7);
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.7);
      transition: border-color 160ms ease, background 160ms ease, color 160ms ease;
    }
    .role-select label:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .role-select input {
      accent-color: var(--accent);
    }

    .call-main {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.2fr);
      gap: 14px;
    }

    /* VIDEO AREA: 3 rows (status | videos | controls), fixed height */
    .video-area {
      background: var(--panel);
      border-radius: 14px;
      border: 1px solid rgba(55, 65, 81, 0.7);
      padding: 10px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 8px;
      max-height: 420px;     /* total panel height */
      overflow: hidden;      /* nothing can bleed out */
    }

    .video-grid {
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 8px;
      align-items: stretch;
      overflow: hidden;      /* keep videos inside area */
    }

    .video-wrapper {
      position: relative;
      background: #020617;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(75, 85, 99, 0.8);
    }

    /* no fixed aspect-ratio: both tiles flex within the grid */

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #020617;
    }

    .video-label {
      position: absolute;
      left: 10px;
      bottom: 10px;
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .video-label span.dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
    }
    .badge-muted {
      background: rgba(248, 113, 113, 0.18);
      border: 1px solid rgba(248, 113, 113, 0.5);
      color: #fecaca;
    }

    .call-status {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .call-status-strong {
      font-size: 12px;
      color: var(--accent);
    }

    .controls-row {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;   /* ensure it stacks above videos */
    }
    .btn {
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      border: 1px solid rgba(75, 85, 99, 0.8);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 160ms ease, border-color 160ms ease, transform 120ms ease;
    }
    .btn:hover {
      background: rgba(15, 23, 42, 1);
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-soft));
      border-color: rgba(148, 163, 184, 0.8);
      color: #e5f4ff;
      font-weight: 500;
    }
    .btn-primary:hover {
      border-color: #7dd3fc;
    }
    .btn-danger {
      background: radial-gradient(circle at top, #ef4444 0, #7f1d1d 60%);
      border-color: rgba(239, 68, 68, 0.8);
      color: #fee2e2;
    }
    .btn-danger:hover {
      border-color: #fecaca;
    }
    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .side-panel {
      background: var(--panel);
      border-radius: 14px;
      border: 1px solid rgba(55, 65, 81, 0.7);
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
      font-size: 12px;
    }
    .side-section {
      padding: 8px 9px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.9);
    }
    .side-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }
    .field-row label {
      min-width: 80px;
      color: var(--muted);
    }
    .field-row input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(75, 85, 99, 0.8);
      background: #020617;
      color: var(--text);
      font-size: 12px;
    }
    .log {
      margin-top: 4px;
      max-height: 180px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .log-line {
      padding: 2px 0;
      border-bottom: 1px dashed rgba(55, 65, 81, 0.7);
    }
    .log-line span.tag {
      display: inline-block;
      min-width: 40px;
      margin-right: 4px;
      color: var(--accent);
    }
    .tag-admin { color: #38bdf8; }
    .tag-client { color: #a855f7; }
    .tag-sys { color: #9ca3af; }

    /* Hide admin-only UI for client role */
    body[data-role="client"] .admin-tools-row {
      display: none;
    }
    body[data-role="client"] .session-log-section {
      display: none;
    }
    body[data-role="client"] .connection-section {
      display: none;
    }
    body[data-role="client"] .client-state-section {
      display: none;
    }

    @media (max-width: 900px) {
      .call-shell { padding: 12px; }
      .call-main { grid-template-columns: 1fr; }
      .video-area { max-height: 360px; }
      .video-grid { grid-template-columns: 1fr; }
      .side-panel {
        grid-template-rows: auto auto auto;
      }
    }

    @media (max-width: 600px) {
      body { padding: 8px; }
      .call-shell {
        border-radius: 0;
        max-width: 100%;
      }
      .call-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .btn {
        flex: 1 1 calc(50% - 6px);
        justify-content: center;
      }
      .side-section {
        padding: 6px 8px;
      }
      .field-row {
        flex-direction: column;
        align-items: flex-start;
      }
      .field-row label {
        min-width: 0;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
  <div class="call-shell">
    <header class="call-header">
      <div>
        <div class="call-title">Live Call · Mohammed Ihsan</div>
        <div style="font-size:13px; color:var(--muted); margin-top:2px;">
          Browser‑to‑browser video.
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <div class="pill">
          <span class="pill-dot"></span>
          <span>WebRTC Active</span>
        </div>
        <div class="role-select">
          <label>
            <input type="radio" name="role" value="client" checked />
            Client
          </label>
          <label>
            <input type="radio" name="role" value="admin" />
            Admin
          </label>
        </div>
      </div>
    </header>

    <section class="call-main">
      <div class="video-area">
        <div class="call-status">
          <div id="statusText">Status: Not connected</div>
          <div class="call-status-strong" id="roleText">Role: Client</div>
        </div>
        <div class="video-grid">
          <div class="video-wrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="video-label" id="remoteLabel">
              <span class="dot"></span>
              <span id="remoteLabelText">Remote</span>
            </div>
          </div>
          <div class="video-wrapper">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="video-label" id="localLabel">
              <span class="dot"></span>
              <span id="localLabelText">You</span>
            </div>
          </div>
        </div>
        <div class="controls-row">
          <button class="btn" id="btnToggleMic">🎙️ Mute</button>
          <button class="btn" id="btnToggleCam">📷 Camera Off</button>
          <button class="btn btn-primary" id="btnStartCall">📞 Start / Join Call</button>
          <button class="btn btn-danger" id="btnEndCall" disabled>⏹ End</button>
        </div>
      </div>

      <aside class="side-panel">
        <div class="side-section connection-section">
          <h3>Connection</h3>
          <div class="field-row">
            <label>Room ID</label>
            <input type="text" id="roomIdInput" value="ihsan-room-1" />
          </div>
          <div class="field-row admin-tools-row" style="justify-content:space-between;">
            <span style="color:var(--muted);">Admin tools:</span>
            <div style="display:flex; gap:6px; flex-wrap:wrap;">
              <button class="btn" id="btnSoftMute" disabled>🔇 Mute Client</button>
              <button class="btn" id="btnSoftUnmute" disabled>🔊 Unmute Client</button>
              <button class="btn" id="btnCamOffClient" disabled>📷 Hide Camera</button>
              <button class="btn" id="btnCamOnClient" disabled>📷 Show Camera</button>
            </div>
          </div>
          <div style="margin-top:4px; font-size:11px; color:var(--muted);">
            Admin controls affect the client stream; client preview may be hidden.
          </div>
        </div>

        <div class="side-section client-state-section">
          <h3>Client State</h3>
          <div id="clientMuteStateText" style="font-size:12px; color:var(--muted);">
            Client mic: unknown
          </div>
          <div id="clientInfoText" style="font-size:12px; color:var(--muted); margin-top:4px;">
            Waiting for connection…
          </div>
        </div>

        <div class="side-section session-log-section">
          <h3>Session Log</h3>
          <div class="log" id="log"></div>
        </div>
      </aside>
    </section>
  </div>

  <script>
    const ADMIN_KEY = "ihsan2025";

    const remoteVideo = document.getElementById("remoteVideo");
    const localVideo = document.getElementById("localVideo");
    const statusText = document.getElementById("statusText");
    const roleText = document.getElementById("roleText");
    const remoteLabelText = document.getElementById("remoteLabelText");
    const localLabelText = document.getElementById("localLabelText");
    const roomIdInput = document.getElementById("roomIdInput");
    const btnToggleMic = document.getElementById("btnToggleMic");
    const btnToggleCam = document.getElementById("btnToggleCam");
    const btnStartCall = document.getElementById("btnStartCall");
    const btnEndCall = document.getElementById("btnEndCall");
    const btnSoftMute = document.getElementById("btnSoftMute");
    const btnSoftUnmute = document.getElementById("btnSoftUnmute");
    const btnCamOffClient = document.getElementById("btnCamOffClient");
    const btnCamOnClient = document.getElementById("btnCamOnClient");
    const clientMuteStateText = document.getElementById("clientMuteStateText");
    const clientInfoText = document.getElementById("clientInfoText");
    const logEl = document.getElementById("log");
    const roleRadios = document.querySelectorAll("input[name='role']");

    let isAdmin = false;
    let isMutedLocally = false;
    let isCamOff = false;
    let hardMutedByAdmin = false;
    let hideLocalPreview = false;

    let localStream = null;
    let remoteStream = null;
    let peer = null;
    let mediaCall = null;
    let dataConn = null;

    function log(tag, msg, kind = "sys") {
      const line = document.createElement("div");
      line.className = "log-line";
      const tagSpan = document.createElement("span");
      tagSpan.className = "tag tag-" + kind;
      tagSpan.textContent = "[" + tag + "]";
      const textSpan = document.createElement("span");
      textSpan.textContent = " " + msg;
      line.appendChild(tagSpan);
      line.appendChild(textSpan);
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function updateRoleUI() {
      document.body.setAttribute("data-role", isAdmin ? "admin" : "client");

      roleText.textContent = "Role: " + (isAdmin ? "Admin" : "Client");
      if (isAdmin) {
        remoteLabelText.textContent = "Client";
        localLabelText.textContent = "You (Admin)";
        btnSoftMute.disabled = false;
        btnSoftUnmute.disabled = false;
        btnCamOffClient.disabled = false;
        btnCamOnClient.disabled = false;
      } else {
        remoteLabelText.textContent = "Host";
        localLabelText.textContent = "You (Client)";
        btnSoftMute.disabled = true;
        btnSoftUnmute.disabled = true;
        btnCamOffClient.disabled = true;
        btnCamOnClient.disabled = true;
      }
    }

    roleRadios.forEach(r => {
      r.addEventListener("change", () => {
        const wantsAdmin = r.value === "admin";

        if (wantsAdmin) {
          const entered = prompt("Enter admin password:");
          if (entered !== ADMIN_KEY) {
            roleRadios.forEach(rr => {
              if (rr.value === "client") rr.checked = true;
            });
            isAdmin = false;
            updateRoleUI();
            log("SYS", "Admin password incorrect — remained in client mode", "sys");
            return;
          }
        }

        isAdmin = wantsAdmin;
        updateRoleUI();
        log("ROLE", isAdmin ? "Switched to ADMIN" : "Switched to CLIENT", isAdmin ? "admin" : "client");
      });
    });

    async function getLocalStream() {
      if (localStream) return localStream;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        localStream = stream;
        if (!hideLocalPreview) {
          localVideo.srcObject = stream;
        } else {
          localVideo.srcObject = null;
        }
        log("SYS", "Camera & mic access granted");
        return stream;
      } catch (err) {
        console.error(err);
        log("ERR", "Failed to get media: " + err.message);
        statusText.textContent = "Status: Media permission denied";
        return null;
      }
    }

    function createPeerIfNeeded() {
      if (peer) return;
      const roomId = roomIdInput.value.trim() || "ihsan-room-1";
      const peerId = isAdmin ? roomId + "-admin" : roomId + "-client";

      peer = new Peer(peerId, {
        host: "0.peerjs.com",
        port: 443,
        secure: true,
      });

      peer.on("open", id => {
        log("SYS", "Peer connected with id: " + id);
        statusText.textContent = "Status: Peer online (" + (isAdmin ? "admin" : "client") + ")";
        if (!isAdmin) connectAsClient();
      });

      peer.on("error", err => {
        console.error(err);
        log("ERR", err.type + ": " + err.message);
        statusText.textContent = "Status: Error — " + err.type;
      });

      peer.on("call", call => {
        log("SYS", "Incoming media call");
        getLocalStream().then(stream => {
          if (!stream) return;
          mediaCall = call;
          call.answer(stream);
          call.on("stream", remote => {
            remoteStream = remote;
            remoteVideo.srcObject = remote;
            statusText.textContent = "Status: In call";
          });
          call.on("close", () => {
            log("SYS", "Media call ended");
            endCall();
          });
        });
      });

      peer.on("connection", conn => {
        dataConn = conn;
        log("SYS", "Data channel connected (" + conn.peer + ")");
        setupDataHandlers();
      });
    }

    function connectAsClient() {
      const roomId = roomIdInput.value.trim() || "ihsan-room-1";
      const adminPeerId = roomId + "-admin";

      dataConn = peer.connect(adminPeerId, { reliable: true });
      dataConn.on("open", () => {
        log("CLIENT", "Data channel open to admin", "client");
        setupDataHandlers();
        dataConn.send({ type: "hello", from: "client" });
      });

      getLocalStream().then(stream => {
        if (!stream) return;
        mediaCall = peer.call(adminPeerId, stream);
        if (!mediaCall) {
          log("ERR", "Failed to start call to admin.");
          return;
        }
        mediaCall.on("stream", remote => {
          remoteStream = remote;
          remoteVideo.srcObject = remote;
          statusText.textContent = "Status: In call with host";
        });
        mediaCall.on("close", () => {
          log("SYS", "Call closed by remote");
          endCall();
        });
      });
    }

    function sendData(msg) {
      if (dataConn && dataConn.open) dataConn.send(msg);
    }

    function setupDataHandlers() {
      if (!dataConn) return;
      dataConn.on("data", msg => {
        if (!msg || typeof msg !== "object") return;

        if (msg.type === "hello") {
          log(isAdmin ? "ADMIN" : "CLIENT", "Hello from " + (msg.from || "peer"), isAdmin ? "admin" : "client");
          if (isAdmin) clientInfoText.textContent = "Client connected.";
        }

        if (msg.type === "mute") {
          if (!isAdmin) {
            hardMutedByAdmin = true;
            setLocalMute(true);
            clientMuteStateText.textContent = "Client mic: muted by host";
            log("ADMIN", "Mute command received — mic disabled", "admin");
          }
        }

        if (msg.type === "unmute") {
          if (!isAdmin) {
            hardMutedByAdmin = false;
            setLocalMute(false);
            clientMuteStateText.textContent = "Client mic: unmuted by host";
            log("ADMIN", "Host unmuted your mic", "admin");
          }
        }

        if (msg.type === "client-mute-state" && isAdmin) {
          clientMuteStateText.textContent = "Client mic: " + (msg.muted ? "muted" : "unmuted");
        }

        // Admin camera control: only affect tracks, not client UI button state
        if (msg.type === "cam-off") {
          if (!isAdmin) {
            if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = false);
            log("ADMIN", "Host turned your camera OFF", "admin");
          }
        }

        if (msg.type === "cam-on") {
          if (!isAdmin) {
            if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = true);
            log("ADMIN", "Host turned your camera ON", "admin");
          }
        }

        if (msg.type === "end") {
          log("SYS", "Call ended by host");
          endCall();
        }
      });
    }

    function setLocalMute(mute) {
      isMutedLocally = mute;
      if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !mute);
      btnToggleMic.textContent = mute ? "🎙️ Unmute" : "🎙️ Mute";
      const label = document.getElementById("localLabel");
      if (mute) label.classList.add("badge-muted");
      else label.classList.remove("badge-muted");

      if (!isAdmin) sendData({ type: "client-mute-state", muted: mute });
    }

    function setLocalCamOff(off) {
      isCamOff = off;
      if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !off);
      btnToggleCam.textContent = off ? "📷 Camera On" : "📷 Camera Off";
    }

    function endCall() {
      if (mediaCall) {
        mediaCall.close();
        mediaCall = null;
      }
      if (dataConn) {
        dataConn.close();
        dataConn = null;
      }
      if (remoteVideo) remoteVideo.srcObject = null;
      remoteStream = null;
      statusText.textContent = "Status: Not connected";
      btnEndCall.disabled = true;
      log("SYS", "Call ended locally");
    }

    btnToggleMic.addEventListener("click", () => {
      if (!localStream) return;
      if (!isAdmin && hardMutedByAdmin) return;
      setLocalMute(!isMutedLocally);
    });

    btnToggleCam.addEventListener("click", () => {
      if (!localStream) return;
      setLocalCamOff(!isCamOff);

      if (!isCamOff) {
        hideLocalPreview = false;
        localVideo.srcObject = localStream;
      } else {
        localVideo.srcObject = null;
      }
    });

    btnStartCall.addEventListener("click", () => {
      createPeerIfNeeded();
      getLocalStream().then(stream => {
        if (!stream) return;
        statusText.textContent = "Status: Initializing call…";
        btnEndCall.disabled = false;
      });
    });

    btnEndCall.addEventListener("click", () => {
      if (isAdmin) sendData({ type: "end" });
      endCall();
    });

    btnSoftMute.addEventListener("click", () => {
      if (!isAdmin) return;
      sendData({ type: "mute" });
      log("ADMIN", "Sent mute command to client", "admin");
    });

    btnSoftUnmute.addEventListener("click", () => {
      if (!isAdmin) return;
      sendData({ type: "unmute" });
      log("ADMIN", "Sent UNMUTE command to client", "admin");
    });

    btnCamOffClient.addEventListener("click", () => {
      if (!isAdmin) return;
      sendData({ type: "cam-off" });
      log("ADMIN", "Sent camera OFF command to client", "admin");
    });

    btnCamOnClient.addEventListener("click", () => {
      if (!isAdmin) return;
      sendData({ type: "cam-on" });
      log("ADMIN", "Sent camera ON command to client", "admin");
    });

    updateRoleUI();
  </script>
